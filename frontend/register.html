<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>ScrapMart | Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="glass-wrapper">

    <div class="glass-card register-card">

      <h2>Create Account</h2>

      <label>Full Name</label>
      <input type="text" id="name" placeholder="John Doe">

      <label>Email</label>
      <input type="email" id="email" placeholder="you@icloud.com">

      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">

      <label>Select Role</label>
      <select id="role" class="glass-input">
        <option value="user">User</option>
        <option value="buyer">Buyer</option>
      </select>

      <button class="glass-btn" onclick="register()">Create Account</button>

      <p class="muted-text">
        Already have account? <a href="index.html">Login</a>
      </p>

    </div>

  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>

</body>

</html>
