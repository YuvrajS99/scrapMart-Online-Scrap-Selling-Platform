<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>About | ScrapMart</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body class="dashboard-body">

  <div id="navbar"></div>

  <div class="page-wrapper">

    <div class="container glass-panel">

      <h1>About ScrapMart</h1>

      <p>
        ScrapMart is a modern recycling platform designed to make scrap management easy and efficient.
        Users can add scrap, track recycling status, and help improve environmental sustainability.
      </p>

      <h2>Developers</h2>

      <ul>
        <li>Devidas Tambe</li>
        <li>Yuvraj Sanap</li>
      </ul>

    </div>

  </div>

  <div id="footer"></div>

  <script>
    fetch("components/navbar.html")
      .then(res => res.text())
      .then(data => document.getElementById("navbar").innerHTML = data);

    fetch("components/footer.html")
      .then(res => res.text())
      .then(data => document.getElementById("footer").innerHTML = data);
  </script>

</body>

</html>
